# Application settings
server.port=8080
spring.application.name=fintrust-backend

# H2 In-Memory Database (Default for zero-setup)
spring.datasource.url=jdbc:h2:mem:fintrustdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL Configuration (Commented out - uncomment if you want to use local PostgreSQL)
# spring.datasource.url=jdbc:postgresql://localhost:5432/fintrust
# spring.datasource.username=postgres
# spring.datasource.password=your_postgres_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# MySQL Configuration (Commented out - uncomment if you want to use local MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/fintrust?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Frame options for H2 console in Spring Security
spring.headers.frame-options=sameorigin

# JWT Configurations (Secret must be at least 256 bits / 32 bytes)
app.jwt.secret=9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d
app.jwt.expiration-ms=86400000

# Gemini API Integration
app.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
app.gemini.key=${GEMINI_API_KEY:}
